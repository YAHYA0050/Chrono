<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHRONO Admin">
<title>CHRONO — الإدارة</title>
<link rel="manifest" href="chrono-admin-manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#f97316;--ph:#ea580c;
  --bg:#0b0b0b;--card:#141414;--card2:#1c1c1c;--card3:#222;
  --light:#f1f5f9;--muted:#64748b;--border:#1e2a38;
  --green:#22c55e;--red:#ef4444;--gold:#fbbf24;--blue:#60a5fa;
  --purple:#a78bfa;--ink:#000;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{background:var(--bg);color:var(--light);font-family:'Noto Kufi Arabic',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100dvh;overflow-x:hidden;}

/* ── APP BAR ── */
.app-bar{position:fixed;top:0;inset-inline:0;z-index:200;background:#0d0d0d;border-bottom:2px solid var(--border);padding:calc(var(--safe-top)+10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.app-bar-brand{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;color:var(--p);letter-spacing:4px;text-shadow:1px 1px 0 #000;}
.app-bar-sub{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.app-bar-right{display:flex;align-items:center;gap:7px;}
.admin-chip{font-size:.72rem;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}

.main{padding-top:calc(var(--safe-top)+68px);padding-bottom:calc(var(--safe-bot)+80px);padding-inline:13px;max-width:820px;margin:0 auto;}

/* ── TAB BAR ── */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit;transition:color .2s,border-color .2s;flex-shrink:0;}
.tab:active{color:var(--p);}
.tab.on{color:var(--p);border-bottom-color:var(--p);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;font-weight:700;border:2px solid var(--ink);font-family:inherit;transition:transform .2s cubic-bezier(.34,1.56,.64,1),filter .18s,background .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;}
.btn:active{transform:scale(.93)!important;}
.btn-primary{background:var(--p);color:#000;padding:10px 16px;font-size:.88rem;}
.btn-primary:active{background:var(--ph);color:#fff;}
.btn-green{background:var(--green);color:#fff;padding:8px 13px;font-size:.82rem;}
.btn-green:active{filter:brightness(1.15);}
.btn-red{background:var(--red);color:#fff;padding:7px 11px;font-size:.78rem;}
.btn-red:active{filter:brightness(1.1);}
.btn-slate{background:#2d3d50;color:#fff;padding:8px 13px;font-size:.82rem;}
.btn-slate:active{filter:brightness(1.2);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 10px;font-size:.75rem;}
.btn-logout:active{border-color:var(--red);color:var(--red);}
.btn-full{width:100%;}

/* ── LOGIN ── */
#login-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.login-box{background:var(--card);border:3px solid var(--ink);border-radius:18px;padding:32px 24px;width:min(380px,100%);box-shadow:6px 6px 0 var(--ink);text-align:center;}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:900;color:var(--p);letter-spacing:5px;margin-bottom:2px;text-shadow:2px 2px 0 #000;}
.login-role{font-size:.73rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}
.login-box input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:1rem;background:#1e1e1e;color:var(--light);font-family:inherit;margin-bottom:10px;text-align:center;transition:border-color .2s,box-shadow .2s;}
.login-box input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 4px rgba(249,115,22,.14);}
.login-err{color:var(--red);font-size:.82rem;margin-top:6px;min-height:1.1em;}
.remember-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-size:.82rem;color:var(--muted);}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:20px;}
@media(min-width:500px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat{background:var(--card);border:3px solid var(--ink);border-radius:12px;padding:14px 12px;text-align:center;box-shadow:4px 4px 0 var(--ink);}
.stat:active{transform:translate(-1px,-1px);}
.stat-icon{font-size:1.6rem;margin-bottom:4px;}
.stat-val{font-size:clamp(1.5rem,6vw,2rem);font-weight:900;line-height:1;}
.stat-lbl{font-size:.65rem;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.s-org .stat-val{color:var(--p);}
.s-blu .stat-val{color:var(--blue);}
.s-grn .stat-val{color:var(--green);}
.s-gld .stat-val{color:var(--gold);}

/* ── FILTER ── */
.filter-row{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;}
.filt{padding:6px 12px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit;}
.filt:active{border-color:var(--p);color:var(--p);}
.filt.on{background:var(--p);color:#000;border-color:var(--p);}

/* ── ORDER CARD (admin) ── */
.ord-card{background:var(--card2);border:2px solid #222;border-radius:12px;padding:13px 14px;margin-bottom:11px;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.ord-card:active{transform:scale(.99);}
.ord-card.faded{opacity:.6;}
.ord-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.ord-rest{font-weight:800;font-size:.95rem;color:var(--p);}
.ord-meta{font-size:.69rem;color:var(--muted);margin-top:1px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;border:1px solid var(--ink);}
.badge-p{background:#fef08a;color:#854d0e;}
.badge-d{background:#bbf7d0;color:#166534;}
.badge-x{background:#fee2e2;color:#991b1b;}

/* ── WORKER BLOCK ── */
.wk-block{display:flex;align-items:center;gap:9px;border-radius:8px;padding:9px 12px;margin:8px 0;border:1px solid;}
.wk-none{background:rgba(100,116,139,.07);border-color:rgba(100,116,139,.2);}
.wk-prog{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.3);animation:wkp 2s ease-in-out infinite;}
.wk-done{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25);}
.wk-adm{background:rgba(96,165,250,.07);border-color:rgba(96,165,250,.25);}
@keyframes wkp{0%,100%{opacity:1;}50%{opacity:.65;}}
.wk-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;border:2px solid;}
.wk-av-none{background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.3);}
.wk-av-prog{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.4);}
.wk-av-done{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);}
.wk-av-adm{background:rgba(96,165,250,.15);border-color:rgba(96,165,250,.4);}
.wk-info{flex:1;min-width:0;}
.wk-lbl{font-size:.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);}
.wk-name{font-size:.92rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wk-none .wk-name{color:var(--muted);}
.wk-prog .wk-name{color:#fdba74;}
.wk-done .wk-name{color:#86efac;}
.wk-adm  .wk-name{color:var(--blue);}
.wk-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.wk-stamp{font-size:.65rem;font-weight:800;padding:3px 8px;border-radius:12px;white-space:nowrap;}
.wk-stamp-none{background:rgba(100,116,139,.15);color:var(--muted);border:1px solid rgba(100,116,139,.25);}
.wk-stamp-prog{background:rgba(249,115,22,.15);color:#fdba74;border:1px solid rgba(249,115,22,.3);}
.wk-stamp-done{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.wk-stamp-adm{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.3);}
.wk-wa{display:inline-flex;align-items:center;gap:4px;background:#25D366;color:#fff;text-decoration:none;padding:4px 9px;border-radius:20px;font-size:.7rem;font-weight:700;border:1px solid var(--ink);}

/* Order body */
.od-body{display:flex;flex-direction:column;gap:5px;margin-bottom:9px;}
.od-row{display:flex;gap:8px;font-size:.83rem;flex-wrap:wrap;align-items:baseline;}
.od-lbl{font-size:.67rem;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;flex-shrink:0;min-width:50px;}
.maps-pill{display:inline-flex;align-items:center;gap:4px;background:#1e3a8a;color:#93c5fd;text-decoration:none;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;border:1px solid #1e3a8a;}
.ord-ft{display:flex;justify-content:flex-end;gap:7px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border);}

/* ── RESTAURANTS ── */
.add-row{display:flex;gap:8px;margin-bottom:13px;}
.add-row input{flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:9px;font-size:.92rem;background:#1a1a1a;color:var(--light);font-family:inherit;}
.add-row input:focus{outline:none;border-color:var(--p);}
.rest-list{display:flex;flex-wrap:wrap;gap:7px;}
.rtag{display:inline-flex;align-items:center;gap:5px;background:#1a2e1a;border:1px solid #2d4a2d;color:#86efac;border-radius:20px;padding:5px 12px;font-size:.8rem;font-weight:600;}
.rtag-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:.95rem;padding:0;line-height:1;font-family:inherit;}

/* ── MENU PHOTOS ── */
.menu-mgr{margin-top:18px;padding-top:16px;border-top:2px solid var(--border);}
.menu-mgr-lbl{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px;}
.menu-sel-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.menu-sel-row select{flex:1;padding:9px 12px;border:2px solid var(--border);border-radius:9px;font-size:.88rem;background:#1a1a1a;color:var(--light);font-family:inherit;min-width:150px;}
.menu-sel-row select:focus{outline:none;border-color:var(--p);}
.upload-lbl{display:inline-flex;align-items:center;gap:6px;background:var(--card3);border:2px dashed var(--border);border-radius:9px;padding:9px 14px;font-size:.82rem;color:var(--muted);cursor:pointer;font-weight:600;}
.upload-lbl:active{border-color:var(--p);color:var(--p);}
.upload-lbl input{display:none;}
.photo-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.photo-thumb{position:relative;width:82px;height:82px;border-radius:8px;overflow:hidden;border:2px solid var(--border);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-del{position:absolute;top:3px;inset-inline-end:3px;background:rgba(0,0,0,.75);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:.7rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-del:active{background:var(--red);}

/* ── DANGER ── */
.danger-zone{background:#110505;border:2px solid #3d1515;border-radius:10px;padding:12px 14px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.danger-txt{font-size:.8rem;color:#fca5a5;}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--safe-bot)+86px);inset-inline-end:13px;background:#1e293b;border:2px solid var(--p);border-radius:12px;padding:11px 15px;font-size:.84rem;font-weight:600;color:var(--light);box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:500;transform:translateY(120px);opacity:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;max-width:290px;}
#toast.show{transform:translateY(0);opacity:1;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;inset-inline:0;z-index:200;background:#0d0d0d;border-top:2px solid var(--border);padding:8px 14px calc(var(--safe-bot)+8px);display:flex;gap:8px;}

/* ── SECTION WRAPPER ── */
.sec{display:none;}.sec.on{display:block;}
.empty-msg{color:var(--muted);text-align:center;padding:28px;font-size:.88rem;}
.last-ref{font-size:.7rem;color:var(--muted);margin-bottom:14px;}

/* ── NOTIF BANNER ── */
#notif-banner{background:rgba(249,115,22,.09);border:1px solid rgba(249,115,22,.28);border-radius:9px;padding:9px 13px;margin-bottom:13px;font-size:.81rem;display:none;align-items:center;gap:9px;}
#notif-banner.show{display:flex;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">CHRONO</div>
    <div class="login-role">🛡️ لوحة الإدارة</div>
    <input type="text"     id="adm-name" placeholder="الاسم الكامل" maxlength="40" autocomplete="name">
    <input type="password" id="adm-pass" placeholder="كلمة المرور" maxlength="30"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="remember-row">
      <input type="checkbox" id="remember" checked>
      <label for="remember" style="cursor:pointer;">ابق متصلاً على هذا الجهاز</label>
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="padding:13px;">🔐 دخول</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none;">

  <div class="app-bar">
    <div>
      <div class="app-bar-brand">CHRONO</div>
      <div class="app-bar-sub">Admin</div>
    </div>
    <div class="app-bar-right">
      <div class="admin-chip" id="adm-chip">👤 —</div>
      <button class="btn btn-logout btn" onclick="doLogout()">↩</button>
    </div>
  </div>

  <div class="main">

    <div id="notif-banner">
      <span>🔔</span>
      <div style="flex:1;">فعّل الإشعارات لتصلك التنبيهات فوراً</div>
      <button class="btn btn-primary" style="padding:6px 11px;font-size:.76rem;" onclick="askNotif()">تفعيل</button>
    </div>

    <div class="last-ref" id="last-ref">—</div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab on" onclick="switchTab('orders',this)">📋 الطلبات</button>
      <button class="tab"    onclick="switchTab('stats',this)">📊 الإحصائيات</button>
      <button class="tab"    onclick="switchTab('rests',this)">🍽️ المطاعم</button>
    </div>

    <!-- TAB: ORDERS -->
    <div id="sec-orders" class="sec on">
      <div class="filter-row">
        <button class="filt on" onclick="setFilt('all',this)">الكل</button>
        <button class="filt"    onclick="setFilt('Pending',this)">⏳ انتظار</button>
        <button class="filt"    onclick="setFilt('Delivered',this)">✅ مُوصَّل</button>
        <button class="filt"    onclick="setFilt('Cancelled',this)">❌ ملغى</button>
      </div>
      <div id="adm-orders"></div>
      <div class="danger-zone">
        <div class="danger-txt">⚠️ حذف جميع الطلبات نهائياً</div>
        <button class="btn btn-red" onclick="clearAllOrders()">🗑 حذف الكل</button>
      </div>
    </div>

    <!-- TAB: STATS -->
    <div id="sec-stats" class="sec">
      <div class="stats-grid">
        <div class="stat s-org"><div class="stat-icon">📦</div><div class="stat-val" id="st-total">0</div><div class="stat-lbl">إجمالي الطلبات</div></div>
        <div class="stat s-blu"><div class="stat-icon">⏳</div><div class="stat-val" id="st-pend">0</div><div class="stat-lbl">في الانتظار</div></div>
        <div class="stat s-grn"><div class="stat-icon">✅</div><div class="stat-val" id="st-done">0</div><div class="stat-lbl">تم التوصيل</div></div>
        <div class="stat s-gld"><div class="stat-icon">👥</div><div class="stat-val" id="st-vis">0</div><div class="stat-lbl">زيارات الموقع</div></div>
      </div>
      <!-- Worker leaderboard -->
      <div style="background:var(--card);border:3px solid var(--ink);border-radius:12px;padding:16px;box-shadow:4px 4px 0 var(--ink);">
        <div style="font-weight:800;font-size:.95rem;color:var(--p);margin-bottom:12px;border-inline-start:4px solid var(--p);padding-inline-start:8px;">🏆 أداء فريق التوصيل</div>
        <div id="leaderboard"></div>
      </div>
    </div>

    <!-- TAB: RESTAURANTS + MENUS -->
    <div id="sec-rests" class="sec">
      <div class="add-row">
        <input type="text" id="new-rest" placeholder="اسم مطعم جديد…" maxlength="60"
          onkeydown="if(event.key==='Enter')addRest()">
        <button class="btn btn-green" onclick="addRest()">➕</button>
      </div>
      <div class="rest-list" id="rest-list"></div>

      <div class="menu-mgr">
        <div class="menu-mgr-lbl">📸 صور المنيو</div>
        <div class="menu-sel-row">
          <select id="menu-sel" onchange="renderMenuPhotos()">
            <option value="">— اختر مطعماً —</option>
          </select>
          <label class="upload-lbl">
            📷 رفع صور
            <input type="file" id="photo-input" accept="image/*" multiple onchange="uploadPhotos(this)">
          </label>
        </div>
        <div class="photo-strip" id="photo-strip">
          <span style="color:var(--muted);font-size:.82rem;">اختر مطعماً لعرض صوره.</span>
        </div>
      </div>
    </div>

  </div><!-- /main -->

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="btn btn-slate" onclick="refreshAll()" style="flex:1;padding:11px;font-size:.82rem;">🔄 تحديث</button>
  </div>

</div><!-- /app -->

<script>
/* ══ SERVICE WORKER ══ */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('chrono-sw.js').catch(e=>console.warn('SW:',e));
}

/* ══ CONSTANTS ══ */
const ADMIN_PASS='admin0000';   // ← CHANGE THIS
const SESSION_KEY='chrono_admin_session';
const INIT_RESTS=["10K","Delish garden","to the sweet","Posto Gosto","Swidi","Coin gourmand","Snack amir","Ait maten","snack zacki","بانبني على الفحم","Snack bg","Green Canarias","Janoub","IMA","Amigo","MC SOLA","La Gondola","With friends","Marmara Fruits","مقشدة يوسف","Brunch Bistro","إمبراطور","Maestro","Le Jus Quotidien","Snack Youness"];

/* ══ STATE ══ */
let adminName='', filt='all', activeTab='orders';
let _lastTs=parseInt(localStorage.getItem('qd_last_order_ts')||'0');

/* ══ DATA ══ */
const getOrders=()=>JSON.parse(localStorage.getItem('qd_orders'))||[];
const saveOrders=o=>localStorage.setItem('qd_orders',JSON.stringify(o));
const getRests=()=>JSON.parse(localStorage.getItem('qd_rests'))||INIT_RESTS;
const saveRests=r=>localStorage.setItem('qd_rests',JSON.stringify(r));
const getMenus=()=>JSON.parse(localStorage.getItem('qd_menus'))||{};
const saveMenus=m=>localStorage.setItem('qd_menus',JSON.stringify(m));

/* ══ TOAST ══ */
function showToast(msg,d=3500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d);}

/* ══ NOTIFICATIONS ══ */
function askNotif(){
  if(!('Notification'in window)){showToast('المتصفح لا يدعم الإشعارات');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){document.getElementById('notif-banner').classList.remove('show');showToast('✅ تم تفعيل الإشعارات');}
    else showToast('❌ تم رفض الإشعارات — فعّلها من الإعدادات');
  });
}
function pushN(title,body){if('Notification'in window&&Notification.permission==='granted'){try{new Notification(title,{body,tag:'chrono-admin',renotify:true,vibrate:[200,100,200]});}catch(e){}}}
function updateNotifBanner(){const b=document.getElementById('notif-banner');if('Notification'in window&&Notification.permission!=='granted')b.classList.add('show');else b.classList.remove('show');}

/* ══ AUTH ══ */
document.addEventListener('DOMContentLoaded',()=>{
  try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'{}');if(s.name){adminName=s.name;enterApp();return;}}catch(e){}
  document.getElementById('login-screen').style.display='flex';
});

function doLogin(){
  const name=document.getElementById('adm-name').value.trim();
  const pass=document.getElementById('adm-pass').value;
  const err=document.getElementById('login-err');
  if(!name){err.textContent='⚠️ أدخل اسمك الكامل';return;}
  if(pass!==ADMIN_PASS){err.textContent='❌ كلمة المرور خاطئة';document.getElementById('adm-pass').value='';return;}
  adminName=name;
  if(document.getElementById('remember').checked)
    localStorage.setItem(SESSION_KEY,JSON.stringify({name}));
  enterApp();
}

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('adm-chip').textContent='👤 '+adminName;
  updateNotifBanner();
  refreshAll();
  setInterval(checkNew,15000);
  window.addEventListener('storage',e=>{if(e.key==='qd_orders'||e.key==='qd_last_order_ts')checkNew();});
}

function doLogout(){
  localStorage.removeItem(SESSION_KEY);
  adminName='';
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('adm-name').value='';
  document.getElementById('adm-pass').value='';
  document.getElementById('login-err').textContent='';
}

/* ══ NEW ORDER CHECK ══ */
function checkNew(){
  const cur=parseInt(localStorage.getItem('qd_last_order_ts')||'0');
  if(cur>_lastTs){
    _lastTs=cur;
    refreshAll();
    pushN('طلب جديد! 🛵','وردَ طلب جديد — تحقق من لوحة الإدارة.');
    showToast('🛵 طلب جديد وارد!');
  }
}

/* ══ TABS ══ */
function switchTab(name,btn){
  activeTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+name).classList.add('on');
  refreshAll();
}

/* ══ REFRESH ══ */
function refreshAll(){
  renderOrders(); renderStats(); renderLeaderboard(); renderRests(); renderMenuSel();
  document.getElementById('last-ref').textContent='آخر تحديث: '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

/* ══ STATS ══ */
function renderStats(){
  const o=getOrders();
  document.getElementById('st-total').textContent=o.length;
  document.getElementById('st-pend').textContent=o.filter(x=>x.status==='Pending').length;
  document.getElementById('st-done').textContent=o.filter(x=>x.status==='Delivered').length;
  document.getElementById('st-vis').textContent=localStorage.getItem('qd_visits')||'0';
}

/* ══ WORKER LEADERBOARD ══ */
function renderLeaderboard(){
  const lb=document.getElementById('leaderboard');
  if(!lb)return;
  const orders=getOrders();
  const workers={};
  orders.forEach(o=>{
    if(o.claimedBy){
      if(!workers[o.claimedBy])workers[o.claimedBy]={claimed:0,delivered:0,wa:o.claimedByWa||''};
      workers[o.claimedBy].claimed++;
      if(o.status==='Delivered')workers[o.claimedBy].delivered++;
    }
  });
  const sorted=Object.entries(workers).sort((a,b)=>b[1].delivered-a[1].delivered);
  if(!sorted.length){lb.innerHTML=`<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:12px;">لا توجد بيانات بعد.</p>`;return;}
  lb.innerHTML='';
  sorted.forEach(([name,data],i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);';
    row.innerHTML=`
      <div style="font-size:1.1rem;width:24px;text-align:center;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:.9rem;">${name}</div>
        <div style="font-size:.72rem;color:var(--muted);">استلم: ${data.claimed} | وصّل: ${data.delivered}</div>
      </div>
      ${data.wa?`<a href="https://wa.me/${data.wa.replace(/\D/g,'')}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;background:#25D366;color:#fff;text-decoration:none;padding:4px 9px;border-radius:20px;font-size:.7rem;font-weight:700;border:1px solid #000;">💬</a>`:''}`;
    lb.appendChild(row);
  });
}

/* ══ FILTER ══ */
function setFilt(f,btn){filt=f;document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderOrders();}

/* ══ ORDERS ══ */
function renderOrders(){
  const c=document.getElementById('adm-orders');if(!c)return;
  c.innerHTML='';
  const all=getOrders();
  const list=filt==='all'?all:all.filter(o=>o.status===filt);
  if(!list.length){c.innerHTML=`<p class="empty-msg">لا توجد طلبات للعرض.</p>`;return;}

  [...list].reverse().forEach(o=>{
    const done=o.status==='Delivered', cancelled=o.status==='Cancelled';
    const worker=o.claimedBy||null, workerWa=o.claimedByWa||null;

    // Worker block
    let wbCls,avCls,stCls,icon,lbl,wname,stamp,waLink='';
    if(done&&worker){
      wbCls='wk-done';avCls='wk-av-done';stCls='wk-stamp-done';icon='✅';lbl='أنجز التوصيل';wname=worker;stamp='مُوصَّل';
      if(workerWa)waLink=`<a class="wk-wa" href="https://wa.me/${workerWa.replace(/\D/g,'')}" target="_blank">💬 واتساب</a>`;
    } else if(done&&!worker){
      wbCls='wk-adm';avCls='wk-av-adm';stCls='wk-stamp-adm';icon='🛡️';lbl='أُنجز بواسطة';wname='الإدارة';stamp='مُوصَّل';
    } else if(!done&&!cancelled&&worker){
      wbCls='wk-prog';avCls='wk-av-prog';stCls='wk-stamp-prog';icon='🛵';lbl='في الطريق';wname=worker;stamp='جارٍ';
      if(workerWa)waLink=`<a class="wk-wa" href="https://wa.me/${workerWa.replace(/\D/g,'')}" target="_blank">💬 واتساب</a>`;
    } else if(cancelled){
      wbCls='wk-none';avCls='wk-av-none';stCls='wk-stamp-none';icon='❌';lbl='ملغى';wname=worker||'—';stamp='ملغى';
    } else {
      wbCls='wk-none';avCls='wk-av-none';stCls='wk-stamp-none';icon='⏳';lbl='لم يُستلم بعد';wname='في انتظار موصّل';stamp='غير مُسنَد';
    }

    const wb=`<div class="wk-block ${wbCls}">
      <div class="wk-av ${avCls}">${icon}</div>
      <div class="wk-info">
        <div class="wk-lbl">${lbl}</div>
        <div class="wk-name">${wname}</div>
        ${workerWa&&!cancelled?`<div style="font-size:.67rem;color:var(--muted);">📱 ${workerWa}</div>`:''}
      </div>
      <div class="wk-right">
        <span class="wk-stamp ${stCls}">${stamp}</span>
        ${waLink}
      </div>
    </div>`;

    const bCls=done?'badge-d':cancelled?'badge-x':'badge-p';
    const bTxt=done?'✅ مُوصَّل':cancelled?'❌ ملغى':'⏳ انتظار';

    const d=document.createElement('div');
    d.className='ord-card'+(done||cancelled?' faded':'');
    d.innerHTML=`
      <div class="ord-hd">
        <div><div class="ord-rest">${o.restaurant}</div><div class="ord-meta">${o.id} · 🕒 ${o.time}</div></div>
        <span class="badge ${bCls}">${bTxt}</span>
      </div>
      ${wb}
      <div class="od-body">
        <div class="od-row"><span class="od-lbl">🛍 الطلب</span><span>${o.items}</span></div>
        <div class="od-row"><span class="od-lbl">📍 العنوان</span><span>${o.address||'—'}</span></div>
        ${o.link?`<div class="od-row"><span class="od-lbl">🗺 الموقع</span><a class="maps-pill" href="${o.link}" target="_blank">📌 فتح</a></div>`:''}
      </div>
      <div class="ord-ft">
        ${!done&&!cancelled?`<button class="btn btn-green" style="padding:6px 11px;font-size:.76rem;" onclick="adminDone('${o.id}')">✅ تحديد كمُوصَّل</button>`:''}
        <button class="btn btn-red" style="padding:6px 11px;font-size:.76rem;" onclick="adminDel('${o.id}')">🗑 حذف</button>
      </div>`;
    c.appendChild(d);
  });
}

function adminDone(id){const o=getOrders();o.forEach(x=>{if(x.id===id)x.status='Delivered';});saveOrders(o);refreshAll();showToast('✅ تم تحديد الطلب كمُوصَّل');}
function adminDel(id){if(!confirm('حذف هذا الطلب؟'))return;saveOrders(getOrders().filter(o=>o.id!==id));refreshAll();}
function clearAllOrders(){if(!confirm('⚠️ حذف جميع الطلبات نهائياً؟'))return;saveOrders([]);refreshAll();showToast('🗑 تم حذف جميع الطلبات');}

/* ══ RESTAURANTS ══ */
function addRest(){
  const inp=document.getElementById('new-rest'),n=inp.value.trim();if(!n)return;
  const r=getRests();
  if(r.map(x=>x.toLowerCase()).includes(n.toLowerCase())){showToast('موجود بالفعل!');return;}
  r.push(n);saveRests(r);renderRests();renderMenuSel();inp.value='';showToast(`✅ تمت إضافة "${n}"`);
}
function delRest(name){if(!confirm(`حذف "${name}"؟`))return;saveRests(getRests().filter(x=>x!==name));renderRests();renderMenuSel();}
function renderRests(){
  const c=document.getElementById('rest-list');if(!c)return;c.innerHTML='';
  getRests().forEach(r=>{
    const t=document.createElement('div');t.className='rtag';
    t.innerHTML=`${r} <button class="rtag-del" onclick="delRest('${r.replace(/'/g,"\\'")}')">✕</button>`;
    c.appendChild(t);
  });
}

/* ══ MENU PHOTOS ══ */
function renderMenuSel(){
  const sel=document.getElementById('menu-sel');if(!sel)return;
  const cur=sel.value;sel.innerHTML='<option value="">— اختر مطعماً —</option>';
  getRests().forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});
  if(cur)sel.value=cur;renderMenuPhotos();
}
function renderMenuPhotos(){
  const rest=document.getElementById('menu-sel')?.value;
  const strip=document.getElementById('photo-strip');if(!strip)return;
  strip.innerHTML='';
  if(!rest){strip.innerHTML=`<span style="color:var(--muted);font-size:.82rem;">اختر مطعماً.</span>`;return;}
  const photos=(getMenus()[rest])||[];
  if(!photos.length){strip.innerHTML=`<span style="color:var(--muted);font-size:.82rem;">لا توجد صور بعد.</span>`;return;}
  photos.forEach((src,i)=>{
    const w=document.createElement('div');w.className='photo-thumb';
    w.innerHTML=`<img src="${src}" alt="menu" loading="lazy"><button class="photo-del" onclick="delPhoto('${rest}',${i})">✕</button>`;
    strip.appendChild(w);
  });
}
function uploadPhotos(input){
  const rest=document.getElementById('menu-sel').value;
  if(!rest){showToast('اختر مطعماً أولاً');input.value='';return;}
  const files=Array.from(input.files);if(!files.length)return;
  const menus=getMenus();if(!menus[rest])menus[rest]=[];
  let done=0;
  files.forEach(file=>{
    if(!file.type.startsWith('image/')){done++;if(done===files.length){saveMenus(menus);renderMenuPhotos();showToast(`✅ تم رفع الصور`);}return;}
    const r=new FileReader();
    r.onload=e=>{menus[rest].push(e.target.result);done++;if(done===files.length){saveMenus(menus);renderMenuPhotos();showToast(`✅ تم رفع ${files.length} صورة`);}};
    r.readAsDataURL(file);
  });
  input.value='';
}
function delPhoto(rest,idx){if(!confirm('حذف هذه الصورة؟'))return;const m=getMenus();if(m[rest]){m[rest].splice(idx,1);saveMenus(m);renderMenuPhotos();}}
</script>
