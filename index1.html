<!DOCTYPE html>
<html lang="ar" dir="rtl" id="app-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CHRONO — الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#f97316;--ph:#ea580c;
  --bg:transparent;
  --card:rgba(20, 20, 20, 0.85);
  --card2:rgba(28, 28, 28, 0.9);
  --card3:#222;
  --light:#f1f5f9;--muted:#64748b;--border:#1e2a38;
  --green:#22c55e;--red:#ef4444;--gold:#fbbf24;--blue:#60a5fa;
  --purple:#a78bfa;--ink:#000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b0b0b;color:var(--light);font-family:'Noto Kufi Arabic','Barlow Condensed',system-ui,sans-serif;font-size:16px;line-height:1.5;padding:14px;min-height:100vh;cursor:none;}
@media(hover:none){body{cursor:auto;}#cdot,#cglow{display:none;}}

/* Language Bar Styling */
.lang-bar {
  position: absolute;
  top: 15px;
  inset-inline-start: 15px;
  display: flex;
  gap: 6px;
  z-index: 10005;
}
.lang-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--light);
  padding: 4px 10px;
  font-size: 0.75rem;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.lang-btn.active {
  background: var(--primary);
  color: #000;
  border-color: var(--primary);
  font-weight: bold;
}

/* ── BACKGROUND VIDEO ── */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  pointer-events: none;
}
.bg-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(11, 11, 11, 0.4); 
  z-index: -1;
  pointer-events: none;
}

/* ── CURSOR ── */
#cdot{pointer-events:none;position:fixed;width:11px;height:11px;background:var(--primary);border-radius:50%;transform:translate(-50%,-50%);z-index:10000;transition:width .13s,height .13s;mix-blend-mode:screen;}
#cdot.big{width:24px;height:24px;background:#fff;}
#cglow{pointer-events:none;position:fixed;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.09) 0%,transparent 70%);transform:translate(-50%,-50%);z-index:9999;}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;inset-inline-end:16px;background:#1e293b;border:2px solid var(--primary);border-radius:12px;padding:12px 18px;font-size:.88rem;font-weight:600;color:var(--light);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:9998;transform:translateY(100px);opacity:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;max-width:300px;}
#toast.show{transform:translateY(0);opacity:1;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.login-box{background:var(--card);border:3px solid var(--ink);border-radius:16px;padding:36px 28px;width:min(380px,100%);box-shadow:6px 6px 0 var(--ink);text-align:center;backdrop-filter: blur(8px);position: relative;}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;font-weight:900;color:var(--primary);letter-spacing:5px;margin-bottom:4px;text-shadow:2px 2px 0 #000;}
.login-title{font-size:.85rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}
.login-box input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:9px;font-size:1rem;background:#1e1e1e;color:#fff;text-align:center;margin-bottom:10px;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
.login-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(249,115,22,.15);}
.login-err{color:var(--red);font-size:.83rem;margin-top:6px;min-height:2em;}
.remember-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;font-size:.84rem;color:var(--muted);}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:9px;font-weight:700;border:2px solid var(--ink);font-family:inherit;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,background .18s,filter .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;}
.btn:active{transform:scale(.95)!important;}
.btn-primary{background:var(--primary);color:#000;padding:12px 20px;font-size:.95rem;}
.btn-primary:hover{background:var(--ph);color:#fff;transform:translateY(-3px) scale(1.04);box-shadow:0 8px 18px rgba(249,115,22,.35);}
.btn-full{width:100%;}
.btn-green{background:var(--green);color:#fff;padding:9px 15px;font-size:.85rem;}
.btn-green:hover{filter:brightness(1.12);transform:translateY(-3px);box-shadow:0 8px 18px rgba(34,197,94,.3);}
.btn-red{background:var(--red);color:#fff;padding:7px 12px;font-size:.8rem;}
.btn-red:hover{filter:brightness(1.1);transform:translateY(-2px);}
.btn-slate{background:#2d3d50;color:#fff;padding:9px 15px;font-size:.85rem;}
.btn-slate:hover{filter:brightness(1.15);transform:translateY(-2px);}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 13px;font-size:.8rem;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.btn-wa-small{background:#25D366;color:#fff;padding:5px 11px;font-size:.78rem;border-radius:7px;border:1px solid var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:5px;font-weight:700;transition:filter .2s,transform .2s;}
.btn-wa-small:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* ── WRAP ── */
.wrap{max-width:820px;margin:0 auto;}

/* ── ADMIN HEADER ── */
.adm-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--border);flex-wrap:wrap;gap:10px;}
.adm-brand{display:flex;align-items:center;gap:12px;}
.adm-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:var(--primary);letter-spacing:4px;text-shadow:1px 1px 0 #000;}
.adm-sub-title{font-size:.75rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.adm-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.admin-badge{font-size:.8rem;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;white-space:nowrap;}
.last-ref{font-size:.73rem;color:var(--muted);margin-top:2px;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px;}
.stat{background:var(--card);border:3px solid var(--ink);border-radius:12px;padding:16px 14px;text-align:center;box-shadow:4px 4px 0 var(--ink);transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;backdrop-filter: blur(6px);}
.stat:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}
.stat-icon{font-size:1.7rem;margin-bottom:5px;}
.stat-val{font-size:clamp(1.6rem,5vw,2.1rem);font-weight:900;line-height:1;}
.stat-lbl{font-size:.7rem;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.s-org .stat-val{color:var(--primary);}
.s-blu .stat-val{color:var(--blue);}
.s-grn .stat-val{color:var(--green);}
.s-gld .stat-val{color:var(--gold);}

/* ── SECTION CARDS ── */
.sec-card{background:var(--card);border:3px solid var(--ink);border-radius:14px;padding:20px 18px;margin-bottom:20px;box-shadow:4px 4px 0 var(--ink);backdrop-filter: blur(6px);}
.sec-title{font-size:1rem;font-weight:800;color:var(--primary);border-inline-start:4px solid var(--primary);padding-inline-start:10px;margin-bottom:16px;}

/* ── FILTER ── */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filt{padding:6px 13px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.filt:hover{border-color:var(--primary);color:var(--primary);}
.filt.on{background:var(--primary);color:#000;border-color:var(--primary);}

/* ── ORDER ROW ── */
.ord-row{background:var(--card2);border:2px solid #252525;border-radius:12px;padding:14px 16px;margin-bottom:11px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,opacity .2s;}
.ord-row:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.ord-row.faded{opacity:.6;}

/* Order header */
.ord-hd{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.ord-rest{font-weight:800;font-size:.97rem;color:var(--primary);}
.ord-meta{font-size:.72rem;color:var(--muted);margin-top:1px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;border:1px solid var(--ink);}
.badge-p{background:#fef08a;color:#854d0e;}
.badge-d{background:#bbf7d0;color:#166534;}
.badge-x{background:#fee2e2;color:#991b1b;}

/* ── WORKER BLOCK ── */
.worker-block{display:flex;align-items:center;gap:10px;border-radius:9px;padding:10px 13px;margin:10px 0;border:1px solid;}
.wk-none    {background:rgba(100,116,139,.07); border-color:rgba(100,116,139,.2);}
.wk-progress{background:rgba(249,115,22,.08);  border-color:rgba(249,115,22,.3); animation:wkpulse 2.2s ease-in-out infinite;}
.wk-done    {background:rgba(34,197,94,.07);   border-color:rgba(34,197,94,.25);}
.wk-admin   {background:rgba(96,165,250,.07);  border-color:rgba(96,165,250,.25);}
@keyframes wkpulse{0%,100%{opacity:1;}50%{opacity:.65;}}

.wk-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;border:2px solid;}
.wk-av-none {background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.3);}
.wk-av-prog {background:rgba(249,115,22,.15); border-color:rgba(249,115,22,.4);}
.wk-av-done {background:rgba(34,197,94,.15);  border-color:rgba(34,197,94,.4);}
.wk-av-admin{background:rgba(96,165,250,.15); border-color:rgba(96,165,250,.4);}

.wk-info{flex:1;min-width:0;}
.wk-lbl{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.wk-name{font-size:.97rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wk-none  .wk-name{color:var(--muted);}
.wk-progress .wk-name{color:#fdba74;}
.wk-done  .wk-name{color:#86efac;}
.wk-admin .wk-name{color:var(--blue);}

.wk-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.wk-stamp{font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:12px;white-space:nowrap;letter-spacing:.3px;}
.wk-stamp-none    {background:rgba(100,116,139,.15);color:var(--muted);border:1px solid rgba(100,116,139,.25);}
.wk-stamp-progress{background:rgba(249,115,22,.15); color:#fdba74; border:1px solid rgba(249,115,22,.3);}
.wk-stamp-done    {background:rgba(34,197,94,.15);  color:#86efac; border:1px solid rgba(34,197,94,.3);}
.wk-stamp-admin   {background:rgba(96,165,250,.15); color:var(--blue);border:1px solid rgba(96,165,250,.3);}

/* Order body details */
.ord-body{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.od-row{display:flex;gap:10px;align-items:baseline;font-size:.85rem;flex-wrap:wrap;}
.od-lbl{font-size:.7rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;flex-shrink:0;min-width:55px;}

/* Maps pill */
.maps-pill{display:inline-flex;align-items:center;gap:4px;background:#1e3a8a;color:#93c5fd;text-decoration:none;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;border:1px solid #1e3a8a;transition:background .2s;}
.maps-pill:hover{background:#1d4ed8;color:#fff;}

/* Footer actions */
.ord-ft{display:flex;justify-content:flex-end;align-items:center;flex-wrap:wrap;gap:7px;padding-top:8px;border-top:1px solid var(--border);}

/* ── RESTAURANT LIST ── */
.add-row{display:flex;gap:9px;margin-bottom:14px;}
.add-row input{flex:1;padding:10px 13px;border:2px solid var(--border);border-radius:9px;font-size:.93rem;background:#1a1a1a;color:#fff;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
.add-row input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(249,115,22,.13);}
.rest-list{display:flex;flex-wrap:wrap;gap:7px;}
.rtag{display:inline-flex;align-items:center;gap:6px;background:#1a2e1a;border:1px solid #2d4a2d;color:#86efac;border-radius:20px;padding:5px 13px;font-size:.82rem;font-weight:600;}
.rtag-del{background:none;border:none;cursor:pointer;color:#ef4444;font-size:1rem;padding:0;line-height:1;transition:transform .15s;font-family:inherit;}
.rtag-del:hover{transform:scale(1.3);}

/* ── MENU PHOTO MANAGER ── */
.menu-mgr{margin-top:18px;border-top:2px solid var(--border);padding-top:16px;}
.menu-mgr-title{font-size:.88rem;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px;}
.menu-sel-row{display:flex;gap:9px;margin-bottom:12px;flex-wrap:wrap;}
.menu-sel-row select{flex:1;padding:9px 13px;border:2px solid var(--border);border-radius:9px;font-size:.9rem;background:#1a1a1a;color:#fff;font-family:inherit;min-width:160px;}
.menu-sel-row select:focus{outline:none;border-color:var(--primary);}
.menu-photos-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.menu-photo-thumb{position:relative;width:90px;height:90px;border-radius:8px;overflow:hidden;border:2px solid var(--border);flex-shrink:0;}
.menu-photo-thumb img{width:100%;height:100%;object-fit:cover;}
.menu-photo-del{position:absolute;top:3px;inset-inline-end:3px;background:rgba(0,0,0,.75);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.menu-photo-del:hover{background:var(--red);}
.upload-label{display:inline-flex;align-items:center;gap:7px;background:var(--card3);border:2px dashed var(--border);border-radius:9px;padding:9px 16px;font-size:.85rem;color:var(--muted);cursor:pointer;font-weight:600;transition:border-color .2s,color .2s;}
.upload-label:hover{border-color:var(--primary);color:var(--primary);}
.upload-label input{display:none;}

/* ── DANGER ZONE ── */
.danger-zone{background:#110505;border:2px solid #3d1515;border-radius:10px;padding:14px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px;}
.danger-txt{font-size:.84rem;color:#fca5a5;}

/* ── EMPTY ── */
.empty-msg{color:var(--muted);text-align:center;padding:24px;font-size:.88rem;}
</style>
</head>
<body>

<video autoplay muted loop playsinline class="bg-video">
  <source src="bg video.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<div id="cglow"></div>
<div id="cdot"></div>
<div id="toast"></div>

<div class="lang-bar">
  <button class="lang-btn active" id="btn-lang-ar" onclick="changeLang('ar')">العربية</button>
  <button class="lang-btn" id="btn-lang-en" onclick="changeLang('en')">English</button>
  <button class="lang-btn" id="btn-lang-fr" onclick="changeLang('fr')">Français</button>
</div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">CHRONO</div>
    <div class="login-title" id="t-login-title">Admin Dashboard</div>
    <input type="text"     id="adm-name" placeholder="الاسم الكامل" maxlength="40">
    <input type="password" id="adm-pass" placeholder="كلمة المرور" maxlength="30"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="remember-row">
      <input type="checkbox" id="remember" checked>
      <label for="remember" id="t-remember-lbl" style="cursor:pointer;">ابق متصلاً على هذا الجهاز</label>
    </div>
    <button class="btn btn-primary btn-full" id="t-login-btn" onclick="doLogin()">🔐 دخول اللوحة</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="admin-app" style="display:none;">
<div class="wrap">

  <div class="adm-hd">
    <div class="adm-brand">
      <div>
        <div class="adm-logo">CHRONO</div>
        <div class="adm-sub-title" id="t-sub-title">لوحة الإدارة</div>
      </div>
    </div>
    <div class="adm-right">
      <div>
        <div class="admin-badge" id="admin-badge">👤 —</div>
        <div class="last-ref" id="last-ref">—</div>
      </div>
      <button class="btn btn-slate" id="t-btn-refresh" onclick="refreshAll()">🔄 تحديث</button>
      <button class="btn btn-logout btn" id="t-btn-logout" onclick="doLogout()">↩ خروج</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat s-org"><div class="stat-icon">📦</div><div class="stat-val" id="st-total">0</div><div class="stat-lbl" id="lbl-st-total">إجمالي الطلبات</div></div>
    <div class="stat s-blu"><div class="stat-icon">⏳</div><div class="stat-val" id="st-pend">0</div><div class="stat-lbl" id="lbl-st-pend">في الانتظار</div></div>
    <div class="stat s-grn"><div class="stat-icon">✅</div><div class="stat-val" id="st-done">0</div><div class="stat-lbl" id="lbl-st-done">تم التوصيل اليوم</div></div>
    <div class="stat s-gld"><div class="stat-icon">👥</div><div class="stat-val" id="st-vis">0</div><div class="stat-lbl" id="lbl-st-vis">الزيارات</div></div>
  </div>

  <div class="sec-card">
    <div class="sec-title" id="t-sec-orders">📋 الطلبات</div>
    <div class="filter-row">
      <button class="filt on"  id="f-all" onclick="setFilt('all',this)">الكل</button>
      <button class="filt" id="f-pending" onclick="setFilt('Pending',this)">⏳ في الانتظار</button>
      <button class="filt" id="f-delivered" onclick="setFilt('Delivered',this)">✅ مُوصَّل</button>
      <button class="filt" id="f-cancelled" onclick="setFilt('Cancelled',this)">❌ ملغى</button>
    </div>
    <div id="adm-orders"></div>
    <div class="danger-zone">
      <div class="danger-txt" id="t-danger-txt">⚠️ حذف جميع الطلبات نهائياً (لا يمكن التراجع)</div>
      <button class="btn btn-red" id="t-btn-clear-all" onclick="clearAllOrders()">🗑 حذف الكل</button>
    </div>
  </div>

  <div class="sec-card">
    <div class="sec-title" id="t-sec-rests">🍽️ المطاعم وصور المنيو</div>

    <div class="add-row">
      <input type="text" id="new-rest" placeholder="اسم مطعم جديد…" maxlength="60"
        onkeydown="if(event.key==='Enter')addRest()">
      <button class="btn btn-green" id="t-btn-add-rest" onclick="addRest()">➕ إضافة</button>
    </div>
    <div class="rest-list" id="rest-list"></div>

    <div class="menu-mgr">
      <div class="menu-mgr-title" id="t-menu-mgr-title">📸 إدارة صور المنيو</div>
      <div class="menu-sel-row">
        <select id="menu-rest-sel" onchange="renderMenuPhotos()">
          <option value="">— اختر مطعماً —</option>
        </select>
        <label class="upload-label" id="t-upload-label">
          📷 رفع صور
          <input type="file" id="photo-upload" accept="image/*" multiple onchange="uploadPhotos(this)">
        </label>
      </div>
      <div class="menu-photos-strip" id="menu-photos-strip">
        <span style="color:var(--muted);font-size:.85rem;">اختر مطعماً لعرض صوره.</span>
      </div>
    </div>
  </div>

</div>
</div>

<script>
/* ── CURSOR ── */
const dot=document.getElementById('cdot'),glow=document.getElementById('cglow');
let mx=0,my=0,gx=0,gy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function gl(){gx+=(mx-gx)*.1;gy+=(my-gy)*.1;glow.style.left=gx+'px';glow.style.top=gy+'px';requestAnimationFrame(gl);})();
function bC(){document.querySelectorAll('button,a,input,select,label').forEach(el=>{el.onmouseenter=()=>dot.classList.add('big');el.onmouseleave=()=>dot.classList.remove('big');});}
function mag(el){el.addEventListener('mousemove',e=>{const r=el.getBoundingClientRect();const dx=(e.clientX-r.left-r.width/2)*.28,dy=(e.clientY-r.top-r.height/2)*.28;el.style.transform=`translate(${dx}px,${dy}px) scale(1.05)`;});el.addEventListener('mouseleave',()=>{el.style.transform='';});}
function bM(){document.querySelectorAll('.btn').forEach(mag);}

/* ── PERSISTENT DAILY DELIVERIES SYNC ── */
function syncDailyDeliveries() {
  const today = new Date().toLocaleDateString('en-CA');
  let data = JSON.parse(localStorage.getItem('qd_daily_delivered')) || { date: today, count: 0 };
  let accounted = JSON.parse(localStorage.getItem('qd_accounted_deliveries')) || [];

  if (data.date !== today) {
    data = { date: today, count: 0 };
  }

  const o = getOrders();
  let newDeliveries = 0;

  o.forEach(x => {
    if (x.status === 'Delivered' && !accounted.includes(x.id)) {
      accounted.push(x.id);
      newDeliveries++;
    }
  });

  if (newDeliveries > 0) {
    data.count += newDeliveries;
  }

  localStorage.setItem('qd_daily_delivered', JSON.stringify(data));
  localStorage.setItem('qd_accounted_deliveries', JSON.stringify(accounted));
  return data.count;
}

/* ── AUTH ── */
document.addEventListener('DOMContentLoaded',()=>{
  askN();
  const s=localStorage.getItem(SESSION_KEY);
  if(s){try{const p=JSON.parse(s);if(p.name&&p.ok){adminName=p.name;enterDash();return;}}catch(e){}}
  document.getElementById('login-screen').style.display='flex';
  bC(); bM();
});

function doLogin(){
  const name=document.getElementById('adm-name').value.trim();
  const pass=document.getElementById('adm-pass').value;
  const err=document.getElementById('login-err');
  if(!name){err.textContent=langs[currentLang].alertName;return;}
  if(pass!==ADMIN_PASS){err.textContent=langs[currentLang].alertWrongPass;document.getElementById('adm-pass').value='';return;}
  adminName=name;
  if(document.getElementById('remember').checked)
    localStorage.setItem(SESSION_KEY,JSON.stringify({name,ok:true}));
  enterDash();
}

function enterDash(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-app').style.display='block';
  document.getElementById('admin-badge').textContent='👤 '+adminName;
  refreshAll();
  setInterval(checkNew,20000);
  bC(); bM();
}

function doLogout(){
  localStorage.removeItem(SESSION_KEY);
  adminName='';
  document.getElementById('admin-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('adm-name').value='';
  document.getElementById('adm-pass').value='';
  document.getElementById('login-err').textContent='';
  bC(); bM();
}

/* ── STATS ── */
function renderStats(){
  const o=getOrders();
  document.getElementById('st-total').textContent=o.length;
  document.getElementById('st-pend').textContent=o.filter(x=>x.status==='Pending').length;
  document.getElementById('st-done').textContent=syncDailyDeliveries(); 
  document.getElementById('st-vis').textContent=localStorage.getItem('qd_visits')||'0';
}

/* ── FILTER ── */
function setFilt(f,btn){filt=f;document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderOrders();}

/* ── ORDERS ── */
function renderOrders(){
  const c=document.getElementById('adm-orders'); c.innerHTML='';
  const all=getOrders();
  const list=filt==='all'?all:all.filter(o=>o.status===filt);
  const ln=langs[currentLang];

  if(!list.length){c.innerHTML=`<p class="empty-msg">${ln.orderEmpty}</p>`;return;}

  [...list].reverse().forEach(o=>{
    const done=o.status==='Delivered';
    const cancelled=o.status==='Cancelled';
    const worker=o.claimedBy||null;
    const workerWa=o.claimedByWa||null;

    let wbClass,avClass,stampClass,icon,lbl,nameText,stamp,waBtn='';
    if(done && worker){
      wbClass='wk-done'; avClass='wk-av-done'; stampClass='wk-stamp-done';
      icon='✅'; lbl=ln.lblDoneBy; nameText=worker; stamp=ln.badgeD;
      if(workerWa) waBtn=`<a class="btn-wa-small" href="https://wa.me/${workerWa.replace(/\D/g,'')}" target="_blank">💬 WhatsApp</a>`;
    } else if(done && !worker){
      wbClass='wk-admin'; avClass='wk-av-admin'; stampClass='wk-stamp-admin';
      icon='🛡️'; lbl=ln.lblAdminBy; nameText=ln.lblAdmin; stamp=ln.badgeD;
    } else if(!done && !cancelled && worker){
      wbClass='wk-progress'; avClass='wk-av-prog'; stampClass='wk-stamp-progress';
      icon='🛵'; lbl=ln.lblOnWay; nameText=worker; stamp=ln.lblProgress;
      if(workerWa) waBtn=`<a class="btn-wa-small" href="https://wa.me/${workerWa.replace(/\D/g,'')}" target="_blank">💬 WhatsApp</a>`;
    } else if(cancelled){
      wbClass='wk-none'; avClass='wk-av-none'; stampClass='wk-stamp-none';
      icon='❌'; lbl=ln.lblCancelled; nameText=worker||'—'; stamp=ln.badgeX;
    } else {
      wbClass='wk-none'; avClass='wk-av-none'; stampClass='wk-stamp-none';
      icon='⏳'; lbl=ln.lblWaiting; nameText=ln.lblNoDriver; stamp=ln.lblUnassigned;
    }

    const wb=`
      <div class="worker-block ${wbClass}">
        <div class="wk-av ${avClass}">${icon}</div>
        <div class="wk-info">
          <div class="wk-lbl">${lbl}</div>
          <div class="wk-name">${nameText}</div>
          ${workerWa&&!cancelled?`<div style="font-size:.72rem;color:var(--muted);margin-top:1px;">📱 ${workerWa}</div>`:''}
        </div>
        <div class="wk-right">
          <span class="wk-stamp ${stampClass}">${stamp}</span>
          ${waBtn}
        </div>
      </div>`;

    const badgeCls=done?'badge-d':cancelled?'badge-x':'badge-p';
    const badgeTxt=done?ln.badgeD:cancelled?ln.badgeX:ln.badgeP;

    const d=document.createElement('div');
    d.className='ord-row'+(done||cancelled?' faded':'');
    d.innerHTML=`
      <div class="ord-hd">
        <div>
          <div class="ord-rest">${o.restaurant}</div>
          <div class="ord-meta">${o.id} · 🕒 ${o.time}</div>
        </div>
        <span class="badge ${badgeCls}">${badgeTxt}</span>
      </div>

      ${wb}

      <div class="ord-body">
        <div class="od-row"><span class="od-lbl">${ln.lblItem}</span><span>${o.items}</span></div>
        <div class="od-row"><span class="od-lbl">${ln.lblAddr}</span><span>${o.address||'—'}</span></div>
        ${o.link?`<div class="od-row"><span class="od-lbl">${ln.lblMap}</span><a class="maps-pill" href="${o.link}" target="_blank">${ln.openMap}</a></div>`:''}
      </div>

      <div class="ord-ft">
        ${!done&&!cancelled?`<button class="btn btn-green" style="padding:6px 12px;font-size:.78rem;" onclick="adminDone('${o.id}')">${ln.btnMarkDone}</button>`:''}
        <button class="btn btn-red" style="padding:6px 12px;font-size:.78rem;" onclick="adminDel('${o.id}')">${ln.btnDelete}</button>
      </div>`;
    c.appendChild(d);
  });
  bC(); bM();
}

function adminDone(id){
  const o=getOrders(); o.forEach(x=>{if(x.id===id)x.status='Delivered';});
  saveOrders(o); refreshAll();
}
function adminDel(id){
  if(!confirm(langs[currentLang].confirmDelete))return;
  saveOrders(getOrders().filter(o=>o.id!==id)); refreshAll();
}
function clearAllOrders(){
  if(!confirm(langs[currentLang].confirmClearAll))return;
  saveOrders([]); refreshAll();
}

/* ── RESTAURANTS ── */
function addRest(){
  const inp=document.getElementById('new-rest'),n=inp.value.trim();
  if(!n)return;
  const r=getRests();
  if(r.map(x=>x.toLowerCase()).includes(n.toLowerCase())){alert(langs[currentLang].restExists);return;}
  r.push(n); saveRests(r); renderRests(); renderMenuRestSel(); inp.value='';
  bC(); bM();
}
function delRest(name){
  if(!confirm(langs[currentLang].confirmDeleteRest))return;
  saveRests(getRests().filter(x=>x!==name));
  renderRests(); renderMenuRestSel();
}
function renderRests(){
  const c=document.getElementById('rest-list'); c.innerHTML='';
  getRests().forEach(r=>{
    const t=document.createElement('div'); t.className='rtag';
    t.innerHTML=`${r} <button class="rtag-del" onclick="delRest('${r.replace(/'/g,"\\'")}')">✕</button>`;
    c.appendChild(t);
  });
  bC();
}

/* ── MENU PHOTOS ── */
function renderMenuRestSel(){
  const sel=document.getElementById('menu-rest-sel');
  const cur=sel.value;
  sel.innerHTML=`<option value="">${langs[currentLang].menuSelectDefault}</option>`;
  getRests().forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});
  if(cur)sel.value=cur;
  renderMenuPhotos();
}

function renderMenuPhotos(){
  const rest=document.getElementById('menu-rest-sel').value;
  const strip=document.getElementById('menu-photos-strip');
  strip.innerHTML='';
  if(!rest){strip.innerHTML=`<span style="color:var(--muted);font-size:.85rem;">${langs[currentLang].menuEmpty}</span>`;return;}
  const menus=getMenus();
  const photos=menus[rest]||[];
  if(!photos.length){strip.innerHTML=`<span style="color:var(--muted);font-size:.85rem;">${langs[currentLang].menuNoPhotos}</span>`;return;}
  photos.forEach((src,i)=>{
    const wrap=document.createElement('div'); wrap.className='menu-photo-thumb';
    wrap.innerHTML=`<img src="${src}" alt="menu"><button class="menu-photo-del" onclick="deleteMenuPhoto('${rest}',${i})" title="Delete">✕</button>`;
    strip.appendChild(wrap);
  });
  bC();
}

function uploadPhotos(input){
  const rest=document.getElementById('menu-rest-sel').value;
  if(!rest){alert(langs[currentLang].selectRestFirst);input.value='';return;}
  const files=Array.from(input.files);
  if(!files.length)return;
  const menus=getMenus();
  if(!menus[rest])menus[rest]=[];
  let loaded=0;
  files.forEach(file=>{
    if(!file.type.startsWith('image/')){loaded++;if(loaded===files.length){saveMenus(menus);renderMenuPhotos();}return;}
    const reader=new FileReader();
    reader.onload=e=>{
      menus[rest].push(e.target.result);
      loaded++;
      if(loaded===files.length){saveMenus(menus);renderMenuPhotos();}
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function deleteMenuPhoto(rest,idx){
  if(!confirm(langs[currentLang].confirmDeletePhoto))return;
  const menus=getMenus();
  if(menus[rest]){menus[rest].splice(idx,1);saveMenus(menus);renderMenuPhotos();}
}
